<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="woodBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e9cc9f"/>
      <stop offset="100%" stop-color="#d8b27f"/>
    </linearGradient>
    <linearGradient id="woodFrame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dfbc8f"/>
      <stop offset="100%" stop-color="#c79a66"/>
    </linearGradient>
    <linearGradient id="woodBrace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dfbc8f"/>
      <stop offset="100%" stop-color="#c79a66"/>
    </linearGradient>
    <filter id="crateShadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="2" dy="5" stdDeviation="5" flood-color="#5b3a13" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Flat wooden crate face inspired by reference image -->
  <g filter="url(#crateShadow)" transform="translate(-1, 1)">
    <rect x="10" y="8" width="142" height="142" rx="2" fill="url(#woodBase)" stroke="#b3844f" stroke-width="1.5"/>

    <!-- Diagonal plank attached corner-to-corner -->
    <line x1="26" y1="24" x2="136" y2="134" stroke="rgba(110,70,28,0.34)" stroke-width="24" stroke-linecap="square"/>
    <line x1="26" y1="24" x2="136" y2="134" stroke="url(#woodBrace)" stroke-width="21" stroke-linecap="square"/>

    <!-- MOD stamp on the diagonal plank -->
    <g transform="rotate(45, 82, 79)">
      <text x="82" y="82"
        font-family="'Arial Black', 'Segoe UI', sans-serif"
        font-size="11" font-weight="900" letter-spacing="0.9"
        text-anchor="middle" fill="#8a4a20" opacity="0.72">MODBOX</text>
      <!-- Stencil cutouts baked into SVG so the effect is consistent -->
      <line x1="58" y1="75.5" x2="106" y2="75.5" stroke="url(#woodBrace)" stroke-width="1.8"/>
      <line x1="58" y1="79.5" x2="106" y2="79.5" stroke="url(#woodBrace)" stroke-width="1.2"/>
    </g>

    <!-- Outer frame with square planks -->
    <rect x="10" y="8" width="24" height="142" fill="rgba(110,70,28,0.34)"/>
    <rect x="128" y="8" width="24" height="142" fill="rgba(110,70,28,0.34)"/>
    <rect x="11.5" y="9.5" width="21" height="139" fill="url(#woodFrame)"/>
    <rect x="129.5" y="9.5" width="21" height="139" fill="url(#woodFrame)"/>
    <rect x="10" y="8" width="142" height="24" fill="rgba(110,70,28,0.34)"/>
    <rect x="10" y="126" width="142" height="24" fill="rgba(110,70,28,0.34)"/>
    <rect x="11.5" y="9.5" width="139" height="21" fill="url(#woodFrame)"/>
    <rect x="11.5" y="127.5" width="139" height="21" fill="url(#woodFrame)"/>
    <rect x="10.5" y="8.5" width="141" height="141" rx="2" fill="none" stroke="#6e461c" stroke-opacity="0.62" stroke-width="1"/>

    <!-- Corner nails -->
    <circle cx="18" cy="16" r="1.8" fill="#7f7f7f"/>
    <circle cx="144" cy="16" r="1.8" fill="#7f7f7f"/>
    <circle cx="18" cy="142" r="1.8" fill="#7f7f7f"/>
    <circle cx="144" cy="142" r="1.8" fill="#7f7f7f"/>
  </g>

</svg>
